<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเก็บแฟ้มผลงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
        
        /* สไตล์สำหรับกล่อง Login */
        .login-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        /* สไตล์สำหรับแอปพลิเคชัน */
        .portfolio-img { height: 200px; object-fit: cover; width: 100%; border-radius: 8px 8px 0 0; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; border-radius: 8px; margin-bottom: 20px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        /* จัดการ Navbar ให้ไม่ล้นจอ */
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>

<div id="loginSection" class="login-wrapper">
    <div class="login-box">
        <h3 class="mb-4 text-primary">Portfolio System</h3>
        <p class="text-muted mb-4">เข้าสู่ระบบเพื่อจัดการแฟ้มผลงาน</p>
        
        <div class="mb-3 text-start">
            <label class="form-label text-muted small">รหัสผ่าน Admin</label>
            <input type="password" id="adminPassword" class="form-control form-control-lg" placeholder="ใส่รหัสผ่าน..." onkeypress="handleEnter(event)">
        </div>
        
        <button class="btn btn-primary btn-lg w-100 mb-3" onclick="login('ADMIN')">เข้าสู่ระบบ (Admin)</button>
        
        <div class="position-relative mb-3">
            <hr>
            <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">หรือ</span>
        </div>
        
        <button class="btn btn-outline-secondary w-100" onclick="login('GUEST')">เข้าชมแบบ Guest</button>
    </div>
</div>

<div id="appSection" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <span class="navbar-brand text-primary">My Portfolio</span>
            <div>
                <span id="userRoleBadge" class="badge bg-secondary me-2">Guest</span>
                <button class="btn btn-sm btn-outline-danger" onclick="logout()">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>ผลงานทั้งหมด</h4>
            <button id="addBtn" class="btn btn-primary d-none" onclick="openModal('ADD')">+ เพิ่มผลงานใหม่</button>
        </div>

        <div class="row" id="portfolioContainer">
            <div class="col-12 text-center text-muted">กรุณารอสักครู่...</div>
        </div>
    </div>
</div>

<div class="modal fade" id="portfolioModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">เพิ่มผลงาน</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="portfolioForm">
            <input type="hidden" id="itemId">
            <input type="hidden" id="actionType">
            <div class="mb-3">
                <label class="form-label">ชื่อผลงาน / รางวัล</label>
                <input type="text" class="form-control" id="title" required>
            </div>
            <div class="mb-3">
                <label class="form-label">วันที่</label>
                <input type="date" class="form-control" id="date" required>
            </div>
            <div class="mb-3">
                <label class="form-label">หมวดหมู่</label>
                <input list="categoryOptions" class="form-control" id="category" placeholder="เลือกหรือพิมพ์ประเภทใหม่..." required>
                <datalist id="categoryOptions"></datalist>
            </div>
            <div class="mb-3">
                <label class="form-label">URL รูปภาพ</label>
                <input type="url" class="form-control" id="imageUrl" placeholder="วางลิงก์รูปภาพที่นี่" required>
            </div>
            <div class="mb-3">
                <label class="form-label">รายละเอียด</label>
                <textarea class="form-control" id="description" rows="3"></textarea>
            </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" id="saveBtn" class="btn btn-success" onclick="saveData()">บันทึกข้อมูล</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 🔴 นำ Web App URL ของคุณมาใส่ตรงนี้
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwUh4vdlIEuz5_wSjup5yx4zaPW5jZiitkrfDVkqYjKLVGcE8iHaB0kDizgl1ITpOozsw/exec';
    
    let portfolioData = [];
    let currentRole = 'GUEST';
    const myModal = new bootstrap.Modal(document.getElementById('portfolioModal'));

    // ฟังก์ชันกด Enter เพื่อ Login
    function handleEnter(event) {
        if (event.key === 'Enter') {
            login('ADMIN');
        }
    }

    // ฟังก์ชันจัดการ Login
    function login(role) {
        if (role === 'ADMIN') {
            const pass = document.getElementById('adminPassword').value;
            // ตรวจสอบรหัสผ่านโดยให้เป็น String อย่างเคร่งครัด
            if (pass !== "1591") {
                alert("รหัสผ่านไม่ถูกต้อง");
                return;
            }
            currentRole = 'ADMIN';
            document.getElementById('userRoleBadge').className = 'badge bg-primary me-2';
            document.getElementById('userRoleBadge').innerText = 'Admin';
            document.getElementById('addBtn').classList.remove('d-none');
        } else {
            currentRole = 'GUEST';
            document.getElementById('userRoleBadge').className = 'badge bg-secondary me-2';
            document.getElementById('userRoleBadge').innerText = 'Guest';
            document.getElementById('addBtn').classList.add('d-none');
        }

        // สลับหน้าจอ
        document.getElementById('loginSection').classList.add('d-none');
        document.getElementById('appSection').classList.remove('d-none');
        fetchData();
    }

    // ฟังก์ชันออกจากระบบ
    function logout() {
        document.getElementById('adminPassword').value = '';
        document.getElementById('appSection').classList.add('d-none');
        document.getElementById('loginSection').classList.remove('d-none');
        document.getElementById('portfolioContainer').innerHTML = '<div class="col-12 text-center text-muted">กรุณารอสักครู่...</div>';
    }

    // ดึงข้อมูลจาก Google Sheet
    function fetchData() {
        fetch(scriptUrl)
            .then(response => response.json())
            .then(data => {
                portfolioData = data;
                updateCategoryDatalist();
                renderData();
            })
            .catch(error => console.error('Error:', error));
    }

    // อัพเดทตัวเลือกหมวดหมู่ให้เลือกใน UI ได้อัตโนมัติ
    function updateCategoryDatalist() {
        const categories = [...new Set(portfolioData.map(item => item.category))];
        const datalist = document.getElementById('categoryOptions');
        datalist.innerHTML = '';
        categories.forEach(cat => {
            if (cat) datalist.innerHTML += `<option value="${cat}">`;
        });
    }

    // แสดงผล Card ผลงาน
    function renderData() {
        const container = document.getElementById('portfolioContainer');
        container.innerHTML = '';
        
        if(portfolioData.length === 0) {
            container.innerHTML = '<div class="col-12 text-center text-muted mt-5">ยังไม่มีรายการผลงาน</div>';
            return;
        }

        portfolioData.reverse().forEach(item => {
            // ซ่อนปุ่มแก้ไข/ลบ ถ้าเป็น Guest
            const actionButtons = currentRole === 'ADMIN' ? `
                <hr>
                <div class="d-flex justify-content-between">
                    <button class="btn btn-sm btn-outline-warning w-100 me-2" onclick="openModal('EDIT', '${item.id}')">แก้ไข</button>
                    <button class="btn btn-sm btn-outline-danger w-100" onclick="deleteData('${item.id}')">ลบ</button>
                </div>
            ` : '';

            const card = `
            <div class="col-md-6 col-lg-4">
                <div class="card h-100">
                    <img src="${item.imageUrl}" class="portfolio-img" alt="รูปผลงาน" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                    <div class="card-body d-flex flex-column">
                        <div>
                            <span class="badge bg-info text-dark mb-2">${item.category}</span>
                            <h5 class="card-title">${item.title}</h5>
                            <h6 class="card-subtitle mb-3 text-muted" style="font-size: 0.85rem;">📅 ${item.date}</h6>
                            <p class="card-text small">${item.description}</p>
                        </div>
                        <div class="mt-auto">
                            ${actionButtons}
                        </div>
                    </div>
                </div>
            </div>`;
            container.innerHTML += card;
        });
    }

    // เปิด Modal สำหรับเพิ่มหรือแก้ไข
    function openModal(action, id = '') {
        document.getElementById('actionType').value = action;
        document.getElementById('portfolioForm').reset();
        
        if (action === 'EDIT') {
            document.getElementById('modalTitle').innerText = 'แก้ไขผลงาน';
            const item = portfolioData.find(d => d.id === id);
            if (item) {
                document.getElementById('itemId').value = item.id;
                document.getElementById('title').value = item.title;
                document.getElementById('date').value = item.date;
                document.getElementById('category').value = item.category;
                document.getElementById('imageUrl').value = item.imageUrl;
                document.getElementById('description').value = item.description;
            }
        } else {
            document.getElementById('modalTitle').innerText = 'เพิ่มผลงานใหม่';
        }
        myModal.show();
    }

    // บันทึกข้อมูล
    function saveData() {
        // ตรวจสอบความถูกต้องของ Form
        const form = document.getElementById('portfolioForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const payload = {
            action: document.getElementById('actionType').value,
            id: document.getElementById('itemId').value,
            title: document.getElementById('title').value,
            date: document.getElementById('date').value,
            category: document.getElementById('category').value,
            imageUrl: document.getElementById('imageUrl').value,
            description: document.getElementById('description').value
        };

        const btn = document.getElementById('saveBtn');
        btn.innerText = 'กำลังบันทึก...';
        btn.disabled = true;

        fetch(scriptUrl, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            myModal.hide();
            fetchData();
        })
        .finally(() => {
            btn.innerText = 'บันทึกข้อมูล';
            btn.disabled = false;
        });
    }

    // ลบข้อมูล
    function deleteData(id) {
        if(confirm('คุณแน่ใจหรือไม่ว่าต้องการลบผลงานชิ้นนี้?')) {
            const payload = { action: 'DELETE', id: id };
            fetch(scriptUrl, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => fetchData());
        }
    }
</script>
</body>
</html>
